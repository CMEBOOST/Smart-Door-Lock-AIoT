<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lock Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full">
        <!-- Main Card -->
        <div class="glass border border-slate-800 rounded-[2.5rem] shadow-2xl p-8 relative overflow-hidden">
            
            <!-- Decoration -->
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-600/20 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-emerald-600/10 rounded-full blur-3xl"></div>

            <!-- Header -->
            <div class="flex justify-between items-center mb-10 relative z-10">
                <div>
                    <h1 class="text-2xl font-bold text-white tracking-tight">Smart Lock</h1>
                    <div class="flex items-center mt-1">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-500 mr-2"></span>
                        <span id="status-text" class="text-xs text-slate-400 uppercase tracking-widest font-semibold">Checking...</span>
                    </div>
                </div>
                <div class="bg-slate-800/50 p-3 rounded-2xl border border-slate-700">
                    <i class="fas fa-shield-halved text-blue-400 text-xl"></i>
                </div>
            </div>

            <!-- Visual Status Indicator -->
            <div class="flex justify-center mb-12 relative z-10">
                <div id="lock-circle" class="w-40 h-40 rounded-full border-4 border-slate-800 flex items-center justify-center transition-all duration-500 shadow-[0_0_50px_rgba(0,0,0,0.3)] bg-slate-900/50">
                    <i id="lock-icon" class="fas fa-lock text-5xl text-slate-600 transition-all duration-500"></i>
                </div>
            </div>

            <!-- Control Buttons -->
            <div class="space-y-4 relative z-10">
                <button onclick="control('unlock')" id="btn-unlock"
                    class="w-full bg-emerald-500 hover:bg-emerald-400 active:scale-95 transition-all py-5 rounded-2xl font-bold text-white shadow-lg shadow-emerald-900/20 flex items-center justify-center group">
                    <i class="fas fa-unlock-alt mr-3 group-hover:rotate-12 transition-transform"></i>
                    UNLOCK / OPEN
                </button>

                <button onclick="control('lock')" id="btn-lock"
                    class="w-full bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all py-5 rounded-2xl font-bold text-slate-300 border border-slate-700 flex items-center justify-center group">
                    <i class="fas fa-lock mr-3 group-hover:scale-110 transition-transform"></i>
                    LOCK / CLOSE
                </button>
            </div>

            <!-- Footer Info -->
            <div class="mt-10 pt-6 border-t border-slate-800 flex justify-between items-center text-[10px] text-slate-500 font-medium tracking-tighter uppercase relative z-10">
                <span>Node: Arduino Nano 33 IoT</span>
                <span id="arduino-ip">IP: 192.168.2.15</span>
            </div>
        </div>
        
        <p class="text-center text-slate-600 text-[10px] mt-6 tracking-widest uppercase">System Online • Secured by FastAPI</p>
    </div>

    <script>
        const API_BASE = "/api";
        let isProcessing = false;

        async function control(action) {
            if (isProcessing) return;
            isProcessing = true;
            
            // Visual feedback
            const btn = document.getElementById(`btn-${action}`);
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-3"></i> PROCESSING...';

            try {
                const response = await fetch(`${API_BASE}/${action}`);
                const data = await response.json();
                
                if (data.status === "success") {
                    updateLockUI(action === 'unlock');
                }
            } catch (error) {
                console.error("Error:", error);
            } finally {
                btn.innerHTML = originalContent;
                isProcessing = false;
            }
        }

        function updateLockUI(isUnlocked) {
            const circle = document.getElementById('lock-circle');
            const icon = document.getElementById('lock-icon');
            
            if (isUnlocked) {
                circle.classList.replace('border-slate-800', 'border-emerald-500/50');
                circle.classList.add('shadow-emerald-500/20');
                icon.classList.replace('fa-lock', 'fa-unlock-alt');
                icon.classList.replace('text-slate-600', 'text-emerald-400');
            } else {
                circle.classList.replace('border-emerald-500/50', 'border-slate-800');
                circle.classList.remove('shadow-emerald-500/20');
                icon.classList.replace('fa-unlock-alt', 'fa-lock');
                icon.classList.replace('text-emerald-400', 'text-slate-600');
            }
        }

        async function checkStatus() {
            try {
                const res = await fetch(`${API_BASE}/status`);
                const data = await res.json();
                const dot = document.getElementById('status-dot');
                const text = document.getElementById('status-text');
                
                if (data.arduino_online) {
                    dot.className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]";
                    text.innerText = "Connected";
                    text.className = "text-xs text-emerald-500 uppercase tracking-widest font-semibold";
                } else {
                    dot.className = "w-2 h-2 rounded-full bg-rose-500 shadow-[0_0_8px_#f43f5e]";
                    text.innerText = "Offline";
                    text.className = "text-xs text-rose-500 uppercase tracking-widest font-semibold";
                }
            } catch {
                document.getElementById('status-text').innerText = "Server Error";
            }
        }

        // Initial check and interval
        setInterval(checkStatus, 5000);
        checkStatus();
    </script>
</body>
</html>
