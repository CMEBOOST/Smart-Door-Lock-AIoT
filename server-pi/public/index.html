<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Door — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg:      #080c10;
    --surface: #0d1117;
    --border:  #1c2333;
    --accent:  #00ff88;
    --danger:  #ff3b5c;
    --warn:    #ffaa00;
    --text:    #c9d1d9;
    --muted:   #484f58;
    --mono:    'Space Mono', monospace;
    --sans:    'Sarabun', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }
  body::before {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,.012) 2px,rgba(0,255,136,.012) 4px);
    pointer-events:none; z-index:0;
  }
  .wrapper { position:relative; z-index:1; max-width:1280px; margin:0 auto; padding:24px 20px; }

  /* Header */
  header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; padding-bottom:18px; border-bottom:1px solid var(--border); }
  .logo { font-family:var(--mono); font-size:14px; color:var(--accent); letter-spacing:3px; }
  .logo span { color:var(--muted); }
  .header-right { display:flex; align-items:center; gap:14px; }
  .clock { font-family:var(--mono); font-size:13px; color:var(--muted); }
  #arduino-badge { display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:6px 12px; font-family:var(--mono); font-size:11px; transition:all .3s; }
  #arduino-badge .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); transition:all .3s; }
  #arduino-badge.online { border-color:rgba(0,255,136,.3); color:var(--accent); }
  #arduino-badge.online .dot { background:var(--accent); box-shadow:0 0 8px var(--accent); }
  #arduino-badge.offline { border-color:rgba(255,59,92,.3); color:var(--danger); }
  #arduino-badge.offline .dot { background:var(--danger); box-shadow:0 0 8px var(--danger); }

  /* Top grid: video | control */
  .top-grid { display:grid; grid-template-columns:1fr 340px; gap:20px; margin-bottom:20px; }
  @media(max-width:900px) { .top-grid { grid-template-columns:1fr; } }

  /* Card */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .card-title { font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; }

  /* Video */
  .video-card { padding:0; overflow:hidden; }
  .video-header { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; border-bottom:1px solid var(--border); }
  .video-header .label { font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:2px; }
  .live-pill { display:flex; align-items:center; gap:6px; background:rgba(255,59,92,.1); border:1px solid rgba(255,59,92,.3); border-radius:20px; padding:3px 10px; font-family:var(--mono); font-size:10px; color:var(--danger); }
  .live-pill.active { background:rgba(0,255,136,.1); border-color:rgba(0,255,136,.3); color:var(--accent); }
  .live-pill .dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
  .live-pill.active .dot { animation:blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  .video-wrap { position:relative; background:#000; aspect-ratio:4/3; }
  #cam-feed { width:100%; height:100%; object-fit:cover; display:block; }
  .corner-tl,.corner-br { position:absolute; width:20px; height:20px; }
  .corner-tl { top:12px; left:12px; border-top:2px solid var(--accent); border-left:2px solid var(--accent); }
  .corner-br { bottom:12px; right:12px; border-bottom:2px solid var(--accent); border-right:2px solid var(--accent); }
  .video-time { position:absolute; bottom:14px; left:16px; font-family:var(--mono); font-size:12px; color:rgba(255,255,255,.5); }

  /* Lock Control */
  .lock-visual { display:flex; justify-content:center; margin:16px 0 20px; }
  .lock-ring { width:110px; height:110px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; transition:all .5s cubic-bezier(.4,0,.2,1); }
  .lock-ring.unlocked { border-color:var(--accent); box-shadow:0 0 40px rgba(0,255,136,.2),inset 0 0 30px rgba(0,255,136,.05); }
  .lock-ring i { font-size:36px; color:var(--muted); transition:all .5s; }
  .lock-ring.unlocked i { color:var(--accent); }
  .btn-row { display:flex; gap:8px; }
  .btn { flex:1; padding:12px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text); font-family:var(--mono); font-size:11px; letter-spacing:1px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:6px; }
  .btn:active { transform:scale(.97); }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn-unlock { border-color:rgba(0,255,136,.4); color:var(--accent); }
  .btn-unlock:hover { background:rgba(0,255,136,.08); }
  .btn-lock:hover { background:rgba(255,255,255,.04); }
  .btn-buzzer { border-color:rgba(255,170,0,.4); color:var(--warn); }
  .btn-buzzer:hover { background:rgba(255,170,0,.08); }
  .btn-buzzer.ringing i { animation:ring .3s infinite alternate; }
  @keyframes ring { from{transform:rotate(-15deg)} to{transform:rotate(15deg)} }
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:14px; }
  .stat { background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:8px; padding:10px; text-align:center; }
  .stat-val { font-family:var(--mono); font-size:20px; font-weight:700; color:var(--accent); }
  .stat-label { font-size:10px; color:var(--muted); margin-top:2px; }
  .stat.danger .stat-val { color:var(--danger); }
  .stat.warn .stat-val { color:var(--warn); }

  /* Bottom grid: logs | suspect gallery */
  .bottom-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media(max-width:900px) { .bottom-grid { grid-template-columns:1fr; } }

  /* Tabs */
  .tabs { display:flex; gap:4px; }
  .tab { padding:5px 12px; border-radius:6px; border:1px solid transparent; background:transparent; color:var(--muted); font-family:var(--mono); font-size:10px; letter-spacing:1px; cursor:pointer; transition:all .2s; }
  .tab.active { background:rgba(0,255,136,.08); border-color:rgba(0,255,136,.3); color:var(--accent); }

  /* Log list */
  .log-list { display:flex; flex-direction:column; gap:5px; max-height:280px; overflow-y:auto; padding-right:3px; margin-top:14px; }
  .log-list::-webkit-scrollbar { width:3px; }
  .log-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .log-item { display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:10px; padding:8px 12px; background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:7px; font-size:12px; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
  .log-badge { font-family:var(--mono); font-size:9px; letter-spacing:1px; padding:2px 7px; border-radius:4px; white-space:nowrap; }
  .badge-WELCOME { background:rgba(0,255,136,.12); color:var(--accent); border:1px solid rgba(0,255,136,.3); }
  .badge-UNLOCK  { background:rgba(0,200,255,.12); color:#00c8ff; border:1px solid rgba(0,200,255,.3); }
  .badge-LOCK    { background:rgba(255,255,255,.06); color:var(--muted); border:1px solid var(--border); }
  .badge-UNKNOWN { background:rgba(255,170,0,.12); color:var(--warn); border:1px solid rgba(255,170,0,.3); }
  .badge-SUSPECT { background:rgba(255,59,92,.12); color:var(--danger); border:1px solid rgba(255,59,92,.3); }
  .log-name { color:var(--text); font-weight:600; }
  .log-sub  { font-size:11px; color:var(--muted); margin-top:1px; }
  .log-time { font-family:var(--mono); font-size:10px; color:var(--muted); white-space:nowrap; }
  .empty-state { text-align:center; padding:30px; color:var(--muted); font-family:var(--mono); font-size:11px; }

  /* Suspect Slideshow */
  .slideshow { margin-top:14px; }
  .slide-main {
    position:relative; aspect-ratio:4/3;
    background:#000; border-radius:10px;
    overflow:hidden; border:1px solid var(--border);
  }
  .slide-main img { width:100%; height:100%; object-fit:cover; display:block; transition:opacity .25s ease; }
  .slide-main img.fade { opacity:0; }
  .slide-overlay {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:space-between; padding:0 10px;
  }
  .slide-arrow {
    background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.15);
    color:#fff; border-radius:8px; width:34px; height:34px;
    font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .2s; backdrop-filter:blur(4px);
  }
  .slide-arrow:hover { background:rgba(255,255,255,.15); }
  .slide-arrow:disabled { opacity:.2; cursor:not-allowed; }
  .slide-badge {
    position:absolute; top:10px; left:10px;
    background:rgba(255,59,92,.85); color:#fff;
    font-family:var(--mono); font-size:9px; letter-spacing:1px;
    padding:3px 8px; border-radius:5px;
  }
  .slide-info {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(transparent,rgba(0,0,0,.8));
    padding:24px 12px 10px;
    font-family:var(--mono); font-size:10px; color:rgba(255,255,255,.7);
  }
  .slide-controls {
    display:flex; justify-content:space-between; align-items:center; margin-top:10px;
  }
  .slide-counter { font-family:var(--mono); font-size:11px; color:var(--muted); }
  .slide-delete {
    background:rgba(255,59,92,.1); border:1px solid rgba(255,59,92,.3);
    color:var(--danger); border-radius:6px; padding:5px 12px;
    font-family:var(--mono); font-size:10px; cursor:pointer; transition:all .2s;
  }
  .slide-delete:hover { background:rgba(255,59,92,.2); }

  /* Modal fullscreen */
  .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:100; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
  .modal.open { display:flex; }
  .modal-img { max-width:92vw; max-height:82vh; border-radius:10px; border:1px solid var(--border); }
  .modal-close { position:absolute; top:20px; right:20px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.1); border-radius:8px; color:#fff; width:36px; height:36px; font-size:16px; cursor:pointer; }

  .icon-btn { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:5px; padding:4px 9px; font-family:var(--mono); font-size:10px; cursor:pointer; transition:all .2s; }
  .icon-btn:hover { color:var(--accent); border-color:rgba(0,255,136,.3); }
</style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo">Smart<span>/</span>Door <span>—</span> AIoT</div>
    <div class="header-right">
      <div class="clock" id="clock">--:--:--</div>
      <div id="arduino-badge"><div class="dot"></div><span id="arduino-status-text">Checking...</span></div>
    </div>
  </header>

  <!-- Top: Camera + Control -->
  <div class="top-grid">
    <div class="card video-card">
      <div class="video-header">
        <div class="label">// Camera Feed</div>
        <div class="live-pill" id="live-pill"><div class="dot"></div><span id="live-text">STANDBY</span></div>
      </div>
      <div class="video-wrap">
        <img id="cam-feed" src="/api/stream" alt="Camera">
        <div class="corner-tl"></div><div class="corner-br"></div>
        <div class="video-time" id="video-time"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">// Door Control</div>
      <div class="lock-visual">
        <div class="lock-ring" id="lock-ring"><i class="fas fa-lock" id="lock-icon"></i></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-unlock" id="btn-unlock" onclick="control('unlock')"><i class="fas fa-unlock-alt"></i> UNLOCK</button>
        <button class="btn btn-lock"   id="btn-lock"   onclick="control('lock')"><i class="fas fa-lock"></i> LOCK</button>
      </div>
      <button class="btn btn-buzzer" id="btn-buzzer" onclick="triggerBuzzer()" style="width:100%;margin-top:8px;">
        <i class="fas fa-bell"></i> BUZZER
      </button>
      <div class="stats">
        <div class="stat"><div class="stat-val" id="stat-welcome">—</div><div class="stat-label">Welcome</div></div>
        <div class="stat warn"><div class="stat-val" id="stat-unknown">—</div><div class="stat-label">Unknown</div></div>
        <div class="stat danger"><div class="stat-val" id="stat-suspect">—</div><div class="stat-label">Suspect</div></div>
      </div>
    </div>
  </div>

  <!-- Bottom: Logs + Suspect Gallery -->
  <div class="bottom-grid">

    <!-- Activity Log -->
    <div class="card">
      <div class="card-title">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('access')">Access Log</button>
          <button class="tab" onclick="switchTab('suspect')">Suspect Log</button>
        </div>
        <button class="icon-btn" onclick="loadAll()"><i class="fas fa-rotate-right"></i></button>
      </div>
      <div id="tab-access"><div class="log-list" id="access-list"><div class="empty-state">Loading...</div></div></div>
      <div id="tab-suspect" style="display:none"><div class="log-list" id="suspect-list"><div class="empty-state">Loading...</div></div></div>
    </div>

    <!-- Suspect Slideshow -->
    <div class="card">
      <div class="card-title">
        // Suspect Photos
        <button class="icon-btn" onclick="loadGallery()"><i class="fas fa-rotate-right"></i></button>
      </div>
      <div class="slideshow" id="slideshow">
        <div class="empty-state">Loading...</div>
      </div>
    </div>

  </div>
</div>

<!-- Modal -->
<div class="modal" id="modal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
  <img class="modal-img" id="modal-img" src="" alt="suspect">
</div>

<script>
const API = '/api';
let isProcessing = false;

// ---- Clock ----
function updateClock() {
  const t = new Date().toLocaleTimeString('th-TH', {hour12:false});
  document.getElementById('clock').textContent    = t;
  document.getElementById('video-time').textContent = t;
}
setInterval(updateClock, 1000); updateClock();

// ---- Stream ----
const camFeed = document.getElementById('cam-feed');
camFeed.onload = () => {
  const pill = document.getElementById('live-pill');
  pill.classList.add('active');
  document.getElementById('live-text').textContent = 'LIVE';
};
camFeed.onerror = () => {
  document.getElementById('live-pill').classList.remove('active');
  document.getElementById('live-text').textContent = 'NO SIGNAL';
  setTimeout(() => { camFeed.src = `/api/stream?t=${Date.now()}`; }, 3000);
};

// ---- Arduino Status ----
async function checkStatus() {
  try {
    const data = await (await fetch(`${API}/status`)).json();
    const badge = document.getElementById('arduino-badge');
    badge.className = data.arduino_online ? 'online' : 'offline';
    document.getElementById('arduino-status-text').textContent =
      data.arduino_online ? 'Arduino Online' : 'Arduino Offline';
  } catch { document.getElementById('arduino-status-text').textContent = 'Server Error'; }
}

// ---- Door Control ----
async function control(action) {
  if (isProcessing) return;
  isProcessing = true;
  const btn = document.getElementById(`btn-${action}`);
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
  try {
    const data = await (await fetch(`${API}/${action}`)).json();
    if (data.status === 'success') updateLockUI(action === 'unlock');
  } catch(e) { console.error(e); }
  finally {
    btn.innerHTML = orig; btn.disabled = false; isProcessing = false;
    setTimeout(loadAll, 1000);
  }
}

function updateLockUI(unlocked) {
  const ring = document.getElementById('lock-ring');
  const icon = document.getElementById('lock-icon');
  if (unlocked) { ring.classList.add('unlocked'); icon.classList.replace('fa-lock','fa-unlock-alt'); }
  else           { ring.classList.remove('unlocked'); icon.classList.replace('fa-unlock-alt','fa-lock'); }
}

// ---- Buzzer ----
async function triggerBuzzer() {
  const btn = document.getElementById('btn-buzzer');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.classList.add('ringing');
  const orig = btn.innerHTML;
  btn.innerHTML = '<i class="fas fa-bell"></i> BUZZING...';
  try {
    await fetch(`${API}/buzzer`);
  } catch(e) { console.error(e); }
  finally {
    // ปลดล็อกปุ่มหลัง buzzer ดังครบ (BUZZER_DURATION วิ)
    setTimeout(() => {
      btn.innerHTML = orig;
      btn.classList.remove('ringing');
      btn.disabled = false;
    }, 10000);
  }
}

// ---- Tabs ----
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',(i===0)===(tab==='access')));
  document.getElementById('tab-access').style.display  = tab==='access'  ? '' : 'none';
  document.getElementById('tab-suspect').style.display = tab==='suspect' ? '' : 'none';
}

// ---- Format ----
function fmtTime(ts) {
  if (!ts) return '—';
  return new Date(ts.replace(' ','T')).toLocaleString('th-TH',{
    day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false
  });
}

function filenameToTime(filename) {
  // suspect_20241201_213045_0.jpg → 20/12 21:30:45
  const m = filename.match(/(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/);
  if (!m) return filename;
  return `${m[3]}/${m[2]} ${m[4]}:${m[5]}:${m[6]}`;
}

// ---- Access Logs ----
async function loadAccessLogs() {
  try {
    const logs = (await (await fetch(`${API}/logs/access?limit=30`)).json()).logs || [];
    document.getElementById('stat-welcome').textContent = logs.filter(l=>l.event==='WELCOME').length;
    document.getElementById('stat-unknown').textContent = logs.filter(l=>l.event==='UNKNOWN').length;
    const list = document.getElementById('access-list');
    list.innerHTML = logs.length ? logs.map(l=>`
      <div class="log-item">
        <span class="log-badge badge-${l.event}">${l.event}</span>
        <div>
          <div class="log-name">${l.name||'—'}</div>
          <div class="log-sub">${l.confidence!=null?`conf: ${parseFloat(l.confidence).toFixed(1)}`:''}</div>
        </div>
        <div class="log-time">${fmtTime(l.timestamp)}</div>
      </div>`).join('') : '<div class="empty-state">ยังไม่มีประวัติ</div>';
  } catch { document.getElementById('access-list').innerHTML='<div class="empty-state">โหลดไม่ได้</div>'; }
}

// ---- Suspect Logs ----
async function loadSuspectLogs() {
  try {
    const logs = (await (await fetch(`${API}/logs/suspect?limit=30`)).json()).logs || [];
    document.getElementById('stat-suspect').textContent = logs.length;
    const list = document.getElementById('suspect-list');
    list.innerHTML = logs.length ? logs.map(l=>`
      <div class="log-item">
        <span class="log-badge badge-SUSPECT">${l.trigger_type==='FACE_UNKNOWN'?'FACE':'LOITER'}</span>
        <div>
          <div class="log-name">${l.trigger_type==='FACE_UNKNOWN'?'ใบหน้าไม่รู้จัก':'ยืนนานผิดปกติ'}</div>
          <div class="log-sub">
            ${l.duration_sec!=null?`${parseFloat(l.duration_sec).toFixed(0)}s`:''} 
            ${l.distance_cm!=null?`· ${parseFloat(l.distance_cm).toFixed(0)}cm`:''} 
            ${l.buzzer_fired?'· 🔔':''}
          </div>
        </div>
        <div class="log-time">${fmtTime(l.timestamp)}</div>
      </div>`).join('') : '<div class="empty-state">ไม่มีเหตุการณ์ผิดปกติ ✓</div>';
  } catch { document.getElementById('suspect-list').innerHTML='<div class="empty-state">โหลดไม่ได้</div>'; }
}

// ---- Suspect Slideshow ----
let _images   = [];
let _slideIdx = 0;

async function loadGallery() {
  const box = document.getElementById('slideshow');
  try {
    const data = await (await fetch(`${API}/suspects/images`)).json();
    _images = data.images || [];
    if (!_images.length) {
      box.innerHTML = '<div class="empty-state">ยังไม่มีรูป suspect</div>';
      return;
    }
    _slideIdx = 0;
    renderSlide();
  } catch {
    box.innerHTML = '<div class="empty-state">โหลดไม่ได้</div>';
  }
}

function renderSlide() {
  const box  = document.getElementById('slideshow');
  const img  = _images[_slideIdx];
  const total = _images.length;
  box.innerHTML = `
    <div class="slide-main">
      <img id="slide-img" src="${img.url}" alt="suspect">
      <div class="slide-badge">⚠ SUSPECT</div>
      <div class="slide-overlay">
        <button class="slide-arrow" onclick="gotoSlide(-1)" ${_slideIdx===0?'disabled':''}>
          <i class="fas fa-chevron-left"></i>
        </button>
        <button class="slide-arrow" onclick="gotoSlide(1)" ${_slideIdx===total-1?'disabled':''}>
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>
      <div class="slide-info">${filenameToTime(img.filename)}</div>
    </div>
    <div class="slide-controls">
      <span class="slide-counter">${_slideIdx+1} / ${total}</span>
      <button class="slide-delete" onclick="deleteSuspect('${img.filename}')">
        <i class="fas fa-trash-alt"></i> ลบรูปนี้
      </button>
    </div>
  `;
  // คลิกรูปเพื่อดูเต็มจอ
  document.getElementById('slide-img').onclick = () => openModal(img.url);
}

function gotoSlide(dir) {
  const next = _slideIdx + dir;
  if (next < 0 || next >= _images.length) return;
  const imgEl = document.getElementById('slide-img');
  if (imgEl) imgEl.classList.add('fade');
  setTimeout(() => {
    _slideIdx = next;
    renderSlide();
  }, 220);
}

async function deleteSuspect(filename) {
  if (!confirm(`ลบรูปนี้ ?`)) return;
  try {
    await fetch(`${API}/suspects/image/${filename}`, { method:'DELETE' });
    _images.splice(_slideIdx, 1);
    if (!_images.length) {
      document.getElementById('slideshow').innerHTML = '<div class="empty-state">ไม่มีรูป suspect แล้ว ✓</div>';
      return;
    }
    _slideIdx = Math.min(_slideIdx, _images.length - 1);
    renderSlide();
  } catch { alert('ลบไม่สำเร็จ'); }
}

// ---- Modal fullscreen ----
function openModal(url) {
  document.getElementById('modal-img').src = url;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function loadAll() {
  loadAccessLogs();
  loadSuspectLogs();
  loadGallery();
  checkStatus();
}

setInterval(loadAll, 10000);
loadAll();
</script>
</body>
</html>
